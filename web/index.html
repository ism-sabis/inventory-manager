<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container { max-width: 640px; margin: auto; }
        h1 { text-align: center; margin-bottom: 20px; }
        h2 { margin: 16px 0 8px; font-size: 16px; color: #aaa; }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 4px;
            background: #333;
            color: #aaa;
            border: 1px solid #555;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }
        .tab-btn.active {
            background: #1a73e8;
            color: #fff;
            border-color: #1a73e8;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 4px;
            font-size: 14px;
            color: #aaa;
        }
        input, select {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 12px;
            font-size: 16px;
            width: 100%;
        }
        input:focus { outline: 2px solid #1a73e8; border-color: #1a73e8; }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: #1a73e8;
            color: #fff;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:hover { background: #1557b0; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .btn-sm {
            display: inline-block;
            width: auto;
            padding: 6px 14px;
            margin: 4px 4px 4px 0;
            font-size: 13px;
        }
        .btn-green { background: #2e7d32; }
        .btn-green:hover { background: #1b5e20; }
        .btn-red { background: #c62828; }
        .btn-red:hover { background: #b71c1c; }

        .status {
            margin-top: 12px;
            padding: 10px;
            border-radius: 4px;
            display: none;
            font-size: 14px;
        }
        .status.success { display: block; background: #1b5e20; }
        .status.error { display: block; background: #b71c1c; }

        .item-detail {
            margin-top: 16px;
            padding: 12px;
            background: #1e1e1e;
            border: 1px solid #333;
            display: none;
        }
        .item-detail.visible { display: block; }
        .item-detail p { margin: 4px 0; }
        .item-detail .item-title { font-size: 16px; font-weight: bold; }
        .item-detail .item-sku { font-size: 13px; color: #aaa; }
        .item-detail .qty { font-size: 24px; font-weight: bold; }
        .item-detail .qty.negative { color: #ef5350; }
        .item-detail .on-order { font-size: 14px; color: #64b5f6; }
        .item-detail img {
            max-width: 200px;
            max-height: 200px;
            margin-top: 8px;
            border: 1px solid #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }
        th, td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th { color: #aaa; font-size: 13px; }
        td { font-size: 14px; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-open { background: #1565c0; }
        .badge-closed { background: #555; }

        .order-card {
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 12px;
            margin-top: 12px;
        }
        .order-card h3 { font-size: 15px; margin-bottom: 8px; }
        .order-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #2a2a2a;
        }
        .order-line:last-child { border-bottom: none; }
        .order-line-info { flex: 1; }
        .order-line-info .line-sku { font-weight: bold; }
        .order-line-info .line-title { font-size: 13px; color: #aaa; }
        .order-line-progress { font-size: 14px; margin: 0 12px; white-space: nowrap; }
        .line-complete { color: #4caf50; }
    </style>
</head>
<body>

<div class="container">
    <h1>Inventory Manager</h1>

    <div class="tabs">
        <button class="tab-btn active" data-tab="add" onclick="showTab('add')">Add</button>
        <button class="tab-btn" data-tab="checkout" onclick="showTab('checkout')">Checkout</button>
        <button class="tab-btn" data-tab="orders" onclick="showTab('orders')">Orders</button>
        <button class="tab-btn" data-tab="inventory" onclick="showTab('inventory')">Inventory</button>
    </div>

    <!-- Add Items Tab -->
    <div id="tab-add" class="tab-content active">
        <form id="addForm">
            <label for="addSku">SKU or Barcode (scan)</label>
            <input type="text" id="addSku" name="sku" autocomplete="off" required>
            <label for="addQty">Quantity</label>
            <input type="number" id="addQty" name="quantity" min="1" value="1" required>
            <button type="submit" class="btn">Add Stock</button>
        </form>
        <div id="addStatus" class="status"></div>
        <div id="addDetail" class="item-detail">
            <p class="item-title" id="addDetailTitle"></p>
            <p class="item-sku" id="addDetailSku"></p>
            <img id="addDetailImg" src="" alt="" style="display:none">
            <p>On hand: <span class="qty" id="addDetailQty"></span></p>
            <p class="on-order" id="addDetailOnOrder" style="display:none"></p>
        </div>
    </div>

    <!-- Checkout Tab -->
    <div id="tab-checkout" class="tab-content">
        <form id="lookupForm">
            <label for="checkoutSku">SKU or Barcode (scan)</label>
            <input type="text" id="checkoutSku" name="sku" autocomplete="off" required>
            <button type="submit" class="btn">Look Up Item</button>
        </form>
        <div id="checkoutDetail" class="item-detail">
            <p class="item-title" id="checkoutDetailTitle"></p>
            <p class="item-sku" id="checkoutDetailSku"></p>
            <img id="checkoutDetailImg" src="" alt="" style="display:none">
            <p>On hand: <span class="qty" id="checkoutDetailQty"></span></p>
            <p class="on-order" id="checkoutDetailOnOrder" style="display:none"></p>
        </div>
        <form id="checkoutForm" style="display:none">
            <label for="checkoutQty">Quantity</label>
            <input type="number" id="checkoutQty" name="quantity" min="1" value="1" required>
            <label for="checkoutProject">Project</label>
            <input type="text" id="checkoutProject" name="project" required>
            <button type="submit" class="btn">Checkout</button>
        </form>
        <div id="checkoutStatus" class="status"></div>
    </div>

    <!-- Orders Tab -->
    <div id="tab-orders" class="tab-content">
        <h2>Create Purchase Order</h2>
        <form id="newOrderForm">
            <label for="orderName">Order Name</label>
            <input type="text" id="orderName" name="name" placeholder="e.g. goBILDA March 2026" required>
            <div id="orderLines">
                <div class="order-line-input" style="margin-top:8px">
                    <label>SKU or Barcode</label>
                    <input type="text" class="ol-sku" autocomplete="off" required>
                    <label>Quantity</label>
                    <input type="number" class="ol-qty" min="1" value="1" required>
                </div>
            </div>
            <button type="button" class="btn btn-sm" style="margin-top:12px" onclick="addOrderLineInput()">+ Add Line</button>
            <button type="submit" class="btn">Create Order</button>
        </form>
        <div id="orderStatus" class="status"></div>

        <h2>Open Orders</h2>
        <div id="ordersList"></div>
    </div>

    <!-- Inventory Tab -->
    <div id="tab-inventory" class="tab-content">
        <form id="searchForm">
            <label for="searchSku">Search by SKU, barcode, or title</label>
            <input type="text" id="searchSku" name="q" autocomplete="off" placeholder="Leave empty to show all">
            <button type="submit" class="btn">Search</button>
        </form>
        <table id="inventoryTable" style="display:none">
            <thead>
                <tr><th>SKU</th><th>Title</th><th>Qty</th><th>On Order</th></tr>
            </thead>
            <tbody id="inventoryBody"></tbody>
        </table>
        <div id="searchStatus" class="status"></div>
    </div>
</div>

<script>
function showTab(name) {
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === name);
    });
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');

    if (name === 'add') document.getElementById('addSku').focus();
    if (name === 'checkout') document.getElementById('checkoutSku').focus();
    if (name === 'orders') loadOrders();
    if (name === 'inventory') {
        document.getElementById('searchSku').focus();
        loadInventory();
    }
}

function showStatus(id, msg, isError) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'status ' + (isError ? 'error' : 'success');
    if (!isError) setTimeout(() => { el.className = 'status'; }, 4000);
}

function showItemDetail(prefix, item) {
    const title = item.title || item.sku;
    document.getElementById(prefix + 'DetailTitle').textContent = title;
    document.getElementById(prefix + 'DetailSku').textContent = item.sku + (item.barcode ? ' / ' + item.barcode : '');
    const img = document.getElementById(prefix + 'DetailImg');
    if (item.image_url) {
        img.src = item.image_url;
        img.style.display = 'block';
    } else {
        img.style.display = 'none';
    }
    const qtyEl = document.getElementById(prefix + 'DetailQty');
    qtyEl.textContent = item.quantity;
    qtyEl.className = 'qty' + (item.quantity < 0 ? ' negative' : '');
    const onOrderEl = document.getElementById(prefix + 'DetailOnOrder');
    if (item.on_order > 0) {
        onOrderEl.textContent = 'On order: ' + item.on_order + ' (expected total: ' + (item.quantity + item.on_order) + ')';
        onOrderEl.style.display = 'block';
    } else {
        onOrderEl.style.display = 'none';
    }
    document.getElementById(prefix + 'Detail').classList.add('visible');
}

// Add Items
document.getElementById('addForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const code = form.sku.value.trim();
    if (!code) return;
    try {
        const resp = await fetch('/api/items', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ sku: code, quantity: parseInt(form.quantity.value) || 1 })
        });
        const data = await resp.json();
        if (!resp.ok) { showStatus('addStatus', data.error, true); return; }
        showStatus('addStatus', 'Added stock for ' + data.sku + ' — now at ' + data.quantity);
        showItemDetail('add', data);
        form.sku.value = '';
        form.quantity.value = '1';
        form.sku.focus();
    } catch (err) {
        showStatus('addStatus', 'Network error', true);
    }
});

// Checkout — Phase 1: Lookup
let checkoutItemSku = '';
document.getElementById('lookupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const code = e.target.sku.value.trim();
    if (!code) return;
    try {
        const resp = await fetch('/api/items/' + encodeURIComponent(code));
        const data = await resp.json();
        if (!resp.ok) {
            showStatus('checkoutStatus', data.error, true);
            document.getElementById('checkoutForm').style.display = 'none';
            document.getElementById('checkoutDetail').classList.remove('visible');
            return;
        }
        checkoutItemSku = data.sku;
        showItemDetail('checkout', data);
        document.getElementById('checkoutForm').style.display = 'block';
        document.getElementById('checkoutQty').value = '1';
        document.getElementById('checkoutProject').value = new Date().toISOString().split('T')[0];
        document.getElementById('checkoutQty').focus();
        document.getElementById('checkoutStatus').className = 'status';
    } catch (err) {
        showStatus('checkoutStatus', 'Network error', true);
    }
});

// Checkout — Phase 2: Confirm
document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const qty = parseInt(form.quantity.value) || 1;
    const project = form.project.value.trim();
    if (!project) { showStatus('checkoutStatus', 'Project is required', true); return; }
    try {
        const resp = await fetch('/api/checkout', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ sku: checkoutItemSku, quantity: qty, project: project })
        });
        const data = await resp.json();
        if (!resp.ok) { showStatus('checkoutStatus', data.error, true); return; }
        showStatus('checkoutStatus', 'Checked out ' + qty + 'x ' + data.sku + ' for ' + project + ' — ' + data.quantity + ' remaining');
        showItemDetail('checkout', data);
        document.getElementById('checkoutForm').style.display = 'none';
        document.getElementById('lookupForm').sku.value = '';
        document.getElementById('checkoutSku').focus();
    } catch (err) {
        showStatus('checkoutStatus', 'Network error', true);
    }
});

// Orders — Create
function addOrderLineInput() {
    const div = document.createElement('div');
    div.className = 'order-line-input';
    div.style.marginTop = '8px';
    div.innerHTML = '<label>SKU or Barcode</label><input type="text" class="ol-sku" autocomplete="off" required>' +
        '<label>Quantity</label><input type="number" class="ol-qty" min="1" value="1" required>';
    document.getElementById('orderLines').appendChild(div);
}

document.getElementById('newOrderForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('orderName').value.trim();
    const skus = document.querySelectorAll('#orderLines .ol-sku');
    const qtys = document.querySelectorAll('#orderLines .ol-qty');
    const lines = [];
    skus.forEach((el, i) => {
        const sku = el.value.trim();
        const qty = parseInt(qtys[i].value) || 1;
        if (sku) lines.push({ sku, quantity: qty });
    });
    if (!name || lines.length === 0) return;
    try {
        const resp = await fetch('/api/orders', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name, lines })
        });
        const data = await resp.json();
        if (!resp.ok) { showStatus('orderStatus', data.error, true); return; }
        showStatus('orderStatus', 'Created order: ' + data.name);
        document.getElementById('orderName').value = '';
        document.getElementById('orderLines').innerHTML =
            '<div class="order-line-input" style="margin-top:8px">' +
            '<label>SKU or Barcode</label><input type="text" class="ol-sku" autocomplete="off" required>' +
            '<label>Quantity</label><input type="number" class="ol-qty" min="1" value="1" required></div>';
        loadOrders();
    } catch (err) {
        showStatus('orderStatus', 'Network error', true);
    }
});

// Orders — List and Receive
async function loadOrders() {
    try {
        const resp = await fetch('/api/orders?status=open');
        const orders = await resp.json();
        const container = document.getElementById('ordersList');
        container.innerHTML = '';
        if (orders.length === 0) {
            container.innerHTML = '<p style="color:#aaa;margin-top:8px">No open orders</p>';
            return;
        }
        for (const order of orders) {
            const detailResp = await fetch('/api/orders/' + order.id);
            const full = await detailResp.json();
            const card = document.createElement('div');
            card.className = 'order-card';
            let linesHtml = '';
            for (const line of (full.lines || [])) {
                const done = line.quantity_received >= line.quantity_ordered;
                const remaining = line.quantity_ordered - line.quantity_received;
                linesHtml += '<div class="order-line">' +
                    '<div class="order-line-info"><span class="line-sku">' + esc(line.sku) + '</span>' +
                    (line.title ? ' <span class="line-title">' + esc(line.title) + '</span>' : '') + '</div>' +
                    '<span class="order-line-progress' + (done ? ' line-complete' : '') + '">' +
                    line.quantity_received + ' / ' + line.quantity_ordered + '</span>' +
                    (done ? '' : '<button class="btn btn-sm btn-green" onclick="receiveLine(' + line.id + ',' + remaining + ')">Receive ' + remaining + '</button>') +
                    '</div>';
            }
            card.innerHTML = '<h3>' + esc(full.name) + ' <span class="badge badge-' + full.status + '">' + full.status + '</span></h3>' + linesHtml;
            container.appendChild(card);
        }
    } catch (err) {
        document.getElementById('ordersList').innerHTML = '<p style="color:#ef5350">Error loading orders</p>';
    }
}

async function receiveLine(lineId, quantity) {
    try {
        const resp = await fetch('/api/orders/receive', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ line_id: lineId, quantity: quantity })
        });
        if (!resp.ok) {
            const data = await resp.json();
            showStatus('orderStatus', data.error, true);
            return;
        }
        loadOrders();
    } catch (err) {
        showStatus('orderStatus', 'Network error', true);
    }
}

// Inventory Search
async function loadInventory() {
    const q = document.getElementById('searchSku').value.trim();
    try {
        const resp = await fetch('/api/items?q=' + encodeURIComponent(q));
        const items = await resp.json();
        const tbody = document.getElementById('inventoryBody');
        tbody.innerHTML = '';
        if (items.length === 0) {
            showStatus('searchStatus', 'No items found', true);
            document.getElementById('inventoryTable').style.display = 'none';
            return;
        }
        document.getElementById('searchStatus').className = 'status';
        items.forEach(item => {
            const tr = document.createElement('tr');
            const qtyClass = item.quantity < 0 ? ' class="negative"' : '';
            const onOrder = item.on_order > 0 ? item.on_order : '';
            tr.innerHTML = '<td>' + esc(item.sku) + '</td><td>' + esc(item.title || '') +
                '</td><td' + qtyClass + '>' + item.quantity + '</td><td>' + onOrder + '</td>';
            tbody.appendChild(tr);
        });
        document.getElementById('inventoryTable').style.display = 'table';
    } catch (err) {
        showStatus('searchStatus', 'Network error', true);
    }
}

document.getElementById('searchForm').addEventListener('submit', (e) => {
    e.preventDefault();
    loadInventory();
});

function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

window.addEventListener('load', () => document.getElementById('addSku').focus());
</script>

</body>
</html>
